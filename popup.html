<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    h3, h1, p {
      text-align: center;
      margin-top: 0;
      color: #fff;
    }
    
    .app-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .app-link {
      display: flex;
      align-items: center;
      padding: 12px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      text-decoration: none;
      color: white;
      transition: all 0.3s ease;
    }
    
    .app-link:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateX(5px);
    }
    
    .app-icon {
      width: 32px;
      height: 32px;
      margin-right: 12px;
      border-radius: 6px;
    }
    
    .app-name {
      font-weight: bold;
    }
  </style>
</head>
<body>
    <h1>Cruz Cristiana</h1>
    <p>Gracias por instalar Cruz Cristiana, una extensión que te trae la compañía de Dios mientras navegas con el simple gesto de mostrar el icono de una cruz en tu dock de extensiones.</p>


  <h3>Cruz Cristiana en más lugares</h3>
  <div class="app-links">
    <a href="https://extensions.gnome.org/extension/8060/christian-cross-in-gnome-bar/" target="_blank" class="app-link">
      <span class="app-name">Extensión de GNOME</span>
    </a>
    
    <a href="https://inled.es" target="_blank" class="app-link">
      <span class="app-name">MacOS</span>
    </a>
  </div>
</body>
</html>
